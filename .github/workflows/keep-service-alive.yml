name: Keep Render Service Alive

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          set -e
          echo "Pinging store-intelligence API health at ${API_URL:-https://store-intelligence-api-i4yz.onrender.com}"
          curl -fsS "${API_URL:-https://store-intelligence-api-i4yz.onrender.com}/health" || echo "Health ping failed"
